name: Fetch Friday Market Closes

on:
  schedule:
    # 22:00 Singapore Time = 14:00 UTC
    - cron: "0 14 * * 5"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-closes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance

      - name: Fetch SPX NDX IWM closes
        run: |
          python scripts/fetch_friday_closes.py

      - name: Commit timestamped data file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/market_closes/*.json

          if git diff --cached --quiet; then
            echo "No new data file to commit."
          else
            git commit -m "Add Friday market close data"
            git push
          fi
