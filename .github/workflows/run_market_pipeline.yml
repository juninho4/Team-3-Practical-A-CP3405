name: Run Market Intelligence

on:
  workflow_dispatch:
  schedule:
    # Saturday 06:30 Singapore time, after the Friday US market close.
    - cron: "30 6 * * 6"
      timezone: "Asia/Singapore"

permissions:
  contents: write

concurrency:
  group: market-intelligence-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: llama-3.3-70b-versatile
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-3.5-flash
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: openrouter/auto-beta
      MPLBACKEND: Agg
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: project/app/requirements.txt

      - name: Install Python dependencies and Chromium
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r project/app/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run R6, R3, R4, R5 and three-provider R8
        run: python project/app/run_integrated_pipeline.py --r8-mode api --r8-only all

      - name: Upload generated output
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: market-intelligence-output-${{ github.run_number }}
          path: vW*/
          if-no-files-found: warn
          retention-days: 30

      - name: Commit successful output to repository
        if: ${{ success() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- 'vW*'
          if git diff --cached --quiet; then
            echo "No output changes to commit."
          else
            git commit -m "chore: update weekly market output [skip ci]"
            git push
          fi
